name: Merge Fork PRs

on:
  push:
    branches:
      - main-fork
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  TAG_PREFIX: "v0.1.0-alpha.internal."

jobs:
  merge:
    name: Merge PRs
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main-fork
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Rewrite SSH URLs to HTTPS and use gh as credential helper
          # so the merge script can fetch PRs (works for private repos too)
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          gh auth setup-git

      - name: Merge PRs from list
        run: contrib/merge-prs.sh

      - name: Push staging branch
        run: git push --force origin HEAD:refs/heads/main-fork-stage

  validate:
    name: Validate
    needs: merge
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0
      - run: make validate


  build:
    name: Build
    needs: merge
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        go-version: ["1.25.8", "1.26.1"]
        exclude:
          - os: ${{ github.event.repository.private && 'ubuntu-24.04-arm' || '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main-fork-stage
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Make
        run: |
          make _output/containerd-shim-nerdbox-v1

  promote:
    name: Promote and tag
    runs-on: ubuntu-latest
    needs: [validate, build]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main-fork-stage
          fetch-tags: true
          fetch-depth: 0

      - name: Push branch and tag
        run: |
          git push --force origin HEAD:refs/heads/main-fork-merged

          PREFIX="${TAG_PREFIX}"
          LAST=$(git tag -l "${PREFIX}*" | sed "s/^${PREFIX}//" | sort -n | tail -1)
          NEXT=$(( ${LAST:-0} + 1 ))
          NEW_TAG="${PREFIX}${NEXT}"
          echo "Creating tag: ${NEW_TAG}"
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"
