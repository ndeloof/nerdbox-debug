name: Internal CI

on:
  push:
    branches:
      - main-internal

permissions:
  contents: write

env:
  TAG_PREFIX: "v0.1.0-alpha.internal."

jobs:
  ci:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0
      - run: make validate
      - run: make _output/containerd-shim-nerdbox-v1

  tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Determine next tag and push
        run: |
          PREFIX="${TAG_PREFIX}"
          LAST=$(git tag -l "${PREFIX}*" | sed "s/^${PREFIX}//" | sort -n | tail -1)
          NEXT=$(( ${LAST:-0} + 1 ))
          NEW_TAG="${PREFIX}${NEXT}"
          echo "Creating tag: ${NEW_TAG}"
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"
